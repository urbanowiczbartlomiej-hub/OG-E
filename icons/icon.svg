<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#141e30"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </radialGradient>
    <radialGradient id="planet" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#4a9adf"/>
      <stop offset="100%" stop-color="#1a4a7a"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0a030"/>
      <stop offset="100%" stop-color="#ff6060"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="url(#bg)"/>

  <!-- Planet (center 56,58) -->
  <circle cx="56" cy="58" r="34" fill="url(#planet)"/>
  <!-- Atmosphere highlight -->
  <path d="M30 40 Q44 26 68 29" fill="none" stroke="#7ec8ff" stroke-width="1.5" opacity=".4" stroke-linecap="round"/>

  <!-- Spaceship silhouette - centered on planet (56,58) -->
  <path d="M47 50 L65 58 L47 66 Z" fill="#c0ddf0" opacity=".7"/>
  <circle cx="59" cy="58" r="3" fill="#a0d0ff" opacity=".5"/>
  <path d="M49 52 L43 44 L53 52" fill="#90bfe0" opacity=".6"/>
  <path d="M49 64 L43 72 L53 64" fill="#90bfe0" opacity=".6"/>
  <path d="M47 53 L39 58 L47 63" fill="#3aaafa" opacity=".4"/>

  <!-- expedition label - warm gradient from gold to coral -->
  <text x="56" y="78" font-family="Arial,sans-serif" font-weight="bold" font-size="9" text-anchor="middle" opacity=".7" fill="url(#textGrad)">expedition</text>

  <!-- Green expedition badge dots -->
  <circle cx="34" cy="84" r="4.5" fill="#00ff00" opacity=".9"/>
  <circle cx="46" cy="84" r="4.5" fill="#00ff00" opacity=".9"/>
  <circle cx="58" cy="84" r="4.5" fill="#00ff00" opacity=".9"/>
</svg>
