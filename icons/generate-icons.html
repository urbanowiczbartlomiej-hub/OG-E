<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>OG-E Icon Generator</title>
  <style>
    body { font-family: monospace; padding: 24px; background: #111; color: #ccc; }
    button { background: #1a5; color: #fff; border: none; padding: 10px 24px; font-size: 16px; cursor: pointer; border-radius: 4px; margin-top: 12px; }
    button:hover { background: #1c6; }
    canvas { display: block; margin: 8px 0; image-rendering: pixelated; }
    .row { display: flex; align-items: center; gap: 16px; margin: 8px 0; }
    .label { width: 60px; }
  </style>
</head>
<body>
  <h2 style="color:#6fb8ff">OG-E Icon Generator</h2>
  <p>Click the button to download icon16.png, icon48.png, and icon128.png.</p>
  <div id="previews"></div>
  <button onclick="generateAll()">Download all PNGs</button>

  <script>
    const SVG_URL = 'icon.svg';
    const SIZES = [16, 48, 128];

    async function svgToPng(svgUrl, size) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = size;
          canvas.height = size;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, size, size);
          canvas.toBlob(blob => resolve({ blob, canvas }), 'image/png');
        };
        img.onerror = reject;
        img.src = svgUrl;
      });
    }

    async function showPreviews() {
      const div = document.getElementById('previews');
      for (const size of SIZES) {
        const { canvas } = await svgToPng(SVG_URL, size);
        const row = document.createElement('div');
        row.className = 'row';
        const label = document.createElement('span');
        label.className = 'label';
        label.textContent = size + 'x' + size;
        row.appendChild(label);
        // show at 2x for small sizes
        const display = document.createElement('canvas');
        const scale = size < 48 ? 4 : size < 128 ? 2 : 1;
        display.width = size * scale;
        display.height = size * scale;
        display.style.width = (size * scale) + 'px';
        display.style.height = (size * scale) + 'px';
        display.getContext('2d').drawImage(canvas, 0, 0, size * scale, size * scale);
        row.appendChild(display);
        div.appendChild(row);
      }
    }

    async function generateAll() {
      for (const size of SIZES) {
        const { blob } = await svgToPng(SVG_URL, size);
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `icon${size}.png`;
        a.click();
        URL.revokeObjectURL(a.href);
        await new Promise(r => setTimeout(r, 200));
      }
    }

    showPreviews();
  </script>
</body>
</html>
